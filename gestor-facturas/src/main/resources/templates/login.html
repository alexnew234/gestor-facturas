<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

<div class="card shadow p-4" style="max-width: 400px; width: 100%;">
    <h3 class="text-center mb-4 text-primary">Acceso Usuarios</h3>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label>Usuario</label>
            <input type="text" name="username" class="form-control" placeholder="Ej: admin o cliente" required>
        </div>
        <div class="mb-3">
            <label>Contraseña</label>
            <input type="password" name="password" class="form-control" placeholder="1234" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Entrar</button>
    </form>

    <div class="mt-3 text-center small text-muted">
        <p>Prueba con:<br> <strong>admin / 1234</strong><br> <strong>Razón social / NIF--CIF</strong></p>
    </div>
</div>

</body>
</html>
