<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:data-bs-theme="${tema}">
<head>
    <meta charset="UTF-8">
    <title>No encontrado (404)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { transition: background 0.3s; background-color: #f3f4f6; }
        [data-bs-theme="dark"] body { background-color: #1e1e2f !important; color: white; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">

<div class="text-center">
    <h1 class="display-1 fw-bold text-primary">404</h1>
    <p class="fs-3"> <span class="text-danger">Opps!</span> Factura no encontrada.</p>
    <p class="lead">
        La factura que buscas no existe o ha sido eliminada.
    </p>
    <a th:href="@{/}" class="btn btn-primary rounded-pill px-4">Ir al Inicio</a>
</div>

</body>
</html>
