<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:data-bs-theme="${tema}">
<head>
    <meta charset="UTF-8">
    <title>Acceso Denegado (403)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { transition: background 0.3s; background-color: #f3f4f6; }
        [data-bs-theme="dark"] body { background-color: #1e1e2f !important; color: white; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">

<div class="text-center">
    <h1 class="display-1 fw-bold text-danger"><i class="bi bi-shield-lock-fill"></i></h1>
    <h2 class="mb-4">Acceso Restringido</h2>
    <p class="lead mb-4">
        Lo sentimos, no tienes permisos suficientes para realizar esta acción.<br>
        Esta funcionalidad es solo para administradores.
    </p>
    <a th:href="@{/}" class="btn btn-outline-secondary rounded-pill px-4">Volver seguro</a>
</div>

</body>
</html>
